        /* ======= KÁRTYA ======= */
        .card {
            width: 100%;
            max-width: 420px;
            min-height: 100vh;
            background: linear-gradient(160deg, #59c4f1 0%, #1a8fc4 35%, #0d6a96 70%, #0a5070 100%);

            padding-bottom: 30px;
            position: relative;

            transition: transform 0.1s ease-out;

        /* ======= PROFIL SZEKCIÓ ======= */
        .profil-szekció {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            padding-bottom: 24px;
            animation: fadeDown 0.7s ease both;
        }

        .profil-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            width: 360px;
            height: 360px;
        }

        /* ======= FLIP KÁRTYA 3D JAVÍTÁS ======= */
        .flip-container {
            width: 250px;
            height: 250px;
            position: absolute;
            z-index: 99; /* Biztosan minden felett legyen, hogy lehessen kattintani */
            cursor: pointer;
            perspective: 1000px;
            -webkit-perspective: 1000px;
        }
        .flip-belso {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            -webkit-transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.4, 0.2, 0.2, 1);
        }
        
        /* Ha aktív az osztály, megfordul */
        .flip-container.flipped .flip-belso {
            transform: rotateY(180deg);
            -webkit-transform: rotateY(180deg);
        }

        .flip-elol, .flip-hatul {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            overflow: hidden;
            border: 3px solid rgba(255,255,255,0.8);
            top: 0; left: 0;
        }
        .flip-elol {
            background: rgba(255,255,255,0.15);
            display: flex; 
            align-items: center; 
            justify-content: center;
            z-index: 2;
            transform: rotateY(0deg);
            -webkit-transform: rotateY(0deg);
            animation: lelegzes 4s ease-in-out 1s infinite;
        }
        .flip-hatul {
            background: #0a2f40;
            transform: rotateY(180deg);
            -webkit-transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px;
            z-index: 1;
        }
        
        /* Letiltjuk a belső elemek kattintását, hogy ne zavarják a containert */
        .flip-belso * {
            pointer-events: none;
        }

        .flip-hatul-kep {
            width: 140px; height: 95px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.3);

        .mentes-gomb {

        .mentes-gomb:active, .mentes-gomb.touch {
